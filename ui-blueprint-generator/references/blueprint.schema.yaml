# yaml-language-server: $schema=http://json-schema.org/draft-07/schema#
# JSON Schema for UI Blueprint files (`<screen-id>.blueprint.yaml`).
# Copy into the project (e.g. ui-blueprints/_schema/blueprint.schema.yaml) and
# wire into a validator script if linting is wanted.
#
# This is the universal schema. Project-specific extensions (custom widgets,
# project verbs, project namespaces) are layered on via _config.yaml.
#
# Note: blueprints are pure YAML documents (single yaml.load). This schema
# validates the loaded object directly. There are no embedded YAML islands.
#
# See references/companion-checks.md for cross-file rules that this schema cannot express.

$schema: http://json-schema.org/draft-07/schema#
title: UIBlueprint
type: object
description: A UI blueprint — single YAML document with 6 top-level keys.
required: [frontmatter, purpose, ui, modes, acceptance]
additionalProperties: false

properties:

  purpose:
    type: string
  notes:
    oneOf:
      - type: string
      - type: "null"

  # ---- Frontmatter ----
  frontmatter:
    type: object
    required: [id, type, title]
    properties:
      id:
        type: string
        pattern: "^[a-z][a-zA-Z0-9]*$"
      type:
        enum: [scene, popup, shared]
      title:
        type: string
      configVersion:
        type: string
        pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      orientation:
        enum: [portrait, landscape, both]
      safeArea:
        type: boolean
      modal:
        type: boolean
      dismissible:
        type: boolean
      behavior:
        enum: [modal, sheet, drawer, toast, tooltip, banner, actionSheet]
      autoDismissMs:
        type: integer
        minimum: 0
      anchorWidget:
        type: string
      snapPoints:
        type: array
        items: { $ref: "#/definitions/sizingUnit" }
      swipeToDismiss:
        type: boolean
      parents:
        type: array
        items: { type: string }
      children:
        type: array
        items: { type: string }
      sources:
        type: array
        items: { type: string }
      dataBindings:
        type: array
        items:
          type: object
          additionalProperties: { type: string }
      emits:
        type: array
        items: { type: string }
      listens:
        type: array
        items: { type: string }
      accessibility:
        type: object
        properties:
          a11yLabel: { type: string }
          a11yRole: { type: string }
          a11yLiveRegion: { enum: [polite, assertive, none] }
          focusOrder:
            type: array
            items: { type: string }
    allOf:
      # modal/dismissible only valid for popup
      - if:
          properties: { type: { const: scene } }
        then:
          properties:
            modal: { not: {} }
            dismissible: { not: {} }
            behavior: { not: {} }
            autoDismissMs: { not: {} }
            anchorWidget: { not: {} }
            snapPoints: { not: {} }
            swipeToDismiss: { not: {} }
      - if:
          properties: { type: { const: shared } }
        then:
          properties:
            modal: { not: {} }
            dismissible: { not: {} }
            behavior: { not: {} }
            autoDismissMs: { not: {} }
            anchorWidget: { not: {} }
            snapPoints: { not: {} }
            swipeToDismiss: { not: {} }
            orientation: { not: {} }
            safeArea: { not: {} }

  # ---- ui (nested tree) ----
  ui:
    $ref: "#/definitions/uiNode"

  # ---- modes ----
  modes:
    oneOf:
      - type: array
        minItems: 1
        items:
          type: object
          required: [id]
          properties:
            id:
              type: string
              pattern: "^[a-z][a-zA-Z0-9]*$"
            description: { type: string }
            initial: { type: boolean }
            final: { type: boolean }
            enter:
              type: object
              properties:
                do:
                  type: array
                  items: { type: string }
            exit:
              type: object
              properties:
                do:
                  type: array
                  items: { type: string }
            on:
              type: array
              items:
                type: object
                properties:
                  widget: { type: string }
                  event:  { type: string }
                  where:  { type: string }
                  do:
                    type: array
                    items: { type: string }
                  goto:
                    type: string
                anyOf:
                  - required: [widget]
                  - required: [event]
      - type: "null"

  # ---- acceptance ----
  acceptance:
    oneOf:
      - type: array
        items:
          type: object
          required: [id, given, when, then]
          properties:
            id:
              type: string
              pattern: "^U[A-Za-z0-9_-]+$"
            given: { type: string }
            when: { type: string }
            then: { type: string }
            test_hint: { type: string }
      - type: "null"

definitions:

  uiNode:
    type: object
    required: [type]
    properties:
      id:
        type: string
        pattern: "^[a-z][a-zA-Z0-9]*$"
      type:
        oneOf:
          # Container types (and Spacer leaf)
          - enum: [VStack, HStack, ZStack, Grid, Scroll, Wrap, Spacer]
          # Widget types
          - enum:
              - Text
              - Image
              - Icon
              - Button
              - IconButton
              - Toggle
              - Slider
              - ProgressBar
              - List
              - HitArea
              - Include
              - Custom
      # Sizing
      width:  { $ref: "#/definitions/sizingUnit" }
      height: { $ref: "#/definitions/sizingUnit" }
      flex:   { type: integer, minimum: 1 }
      align:  { $ref: "#/definitions/alignNine" }
      offset:
        type: object
        properties:
          x: { $ref: "#/definitions/sizingUnit" }
          y: { $ref: "#/definitions/sizingUnit" }
      padding:
        oneOf:
          - $ref: "#/definitions/sizingUnit"
          - type: object
            properties:
              t: { $ref: "#/definitions/sizingUnit" }
              r: { $ref: "#/definitions/sizingUnit" }
              b: { $ref: "#/definitions/sizingUnit" }
              l: { $ref: "#/definitions/sizingUnit" }
              h: { $ref: "#/definitions/sizingUnit" }
              v: { $ref: "#/definitions/sizingUnit" }
            additionalProperties: false
      # Bindings / interactions
      bind:
        oneOf:
          - type: object
            additionalProperties: true
          - type: string
      visible:
        type: object
        required: [bind]
        properties:
          bind: { type: string }
      enabled:
        type: object
        required: [bind]
        properties:
          bind: { type: string }
      on:
        type: object
        additionalProperties:
          type: array
          items: { type: string }
      style:
        type: object
        additionalProperties: true
      # Container nesting
      children:
        type: array
        items: { $ref: "#/definitions/uiNode" }
      # Container-specific options
      cols: { type: integer, minimum: 1 }
      rows: { oneOf: [{ type: integer, minimum: 1 }, { const: auto }] }
      gap:  { $ref: "#/definitions/sizingUnit" }
      axis: { enum: [vertical, horizontal] }
      runGap: { $ref: "#/definitions/sizingUnit" }
      itemGap: { $ref: "#/definitions/sizingUnit" }
      # Widget-specific props (universal subset; project widgets layer more in _config.yaml)
      text:    { type: string }
      label:   { type: string }
      icon:    { type: string }
      asset:   { type: string }
      fit:     { enum: [contain, cover, fill] }
      tint:    { type: string }
      size:    { $ref: "#/definitions/sizingUnit" }
      maxLines: { type: integer, minimum: 1 }
      min:     { type: number }
      max:     { type: number }
      step:    { type: number }
      variant: { type: string }
      separator: { type: boolean }
      badge:
        type: object
        additionalProperties: true
      a11yLabel: { type: string }
      # Custom widget
      name:    { type: string }
      props:
        type: object
        additionalProperties: true
      # Include widget — references a shared blueprint
      ref:     { type: string, pattern: "^[a-z][a-zA-Z0-9]*$" }
      itemTemplate:
        $ref: "#/definitions/uiNode"
    allOf:
      # Custom requires `name`
      - if:
          properties: { type: { const: Custom } }
        then:
          required: [name]
      # Include requires `ref` and forbids `name`
      - if:
          properties: { type: { const: Include } }
        then:
          required: [ref]
          properties:
            name: { not: {} }
      # ZStack children require `align` and Custom-on-Include cross-checks live in companion-checks.md.
      # Forbid sibling fmt at top level — fmt belongs inside bind.
      - properties:
          fmt: { not: {} }

  sizingUnit:
    type: string
    # Matches: 70dp, 100%w, 100%h, 50%sw, 50%sh, auto, fill, min(...), max(...)
    # Compound expressions inside min()/max() validated by a companion script.
    pattern: "^([0-9]+(\\.[0-9]+)?(dp|%w|%h|%sw|%sh)|auto|fill|min\\([^)]+\\)|max\\([^)]+\\))$"

  alignNine:
    enum:
      - top-left
      - top-center
      - top-right
      - center-left
      - center
      - center-right
      - bottom-left
      - bottom-center
      - bottom-right
