frontmatter:
  id: hudTopBar
  type: shared
  title: "HUD top bar (back, title, settings)"
  parents: [gameplayScene, levelSelect, settingsScene, resultPopup]
  sources:
    - "specs/ux/navigation.md#top-bar"
  dataBindings:
    - data: TopBarData      # { titleKey: i18nPath, showSettings: bool }
  emits: []
  listens: []

purpose: |
  Reusable top bar widget cluster used across multiple scenes and popups. Provides a
  consistent back button on the left, title in the center, and optional settings icon
  on the right. Parents inject context via `data.titleKey` (i18n path) and
  `data.showSettings` (visibility flag).

  This is a `type: shared` blueprint — it is not navigated to directly. Parents
  include it via `{ type: Include, ref: hudTopBar, props: { ... } }` from their `ui`
  tree.

ui:
  type: ZStack
  height: "10%sh"
  children:
    - id: btnBack
      type: IconButton
      align: center-left
      icon: chevron-left
      on:
        tap:
          - nav.back()

    - id: lblTitle
      type: Text
      align: center
      bind: { text: "data.titleKey" }
      style: { text: token.h2 }

    - id: btnSettings
      type: IconButton
      align: center-right
      icon: gear
      visible: { bind: "data.showSettings === true" }
      on:
        tap:
          - ui.openPopup("settingsPopup")

modes: null

acceptance:
  - id: U-hudTopBar-1
    given: "shared=hudTopBar, data.showSettings=false"
    when: "render"
    then: "btnSettings is not visible"
    test_hint: "unit"

  - id: U-hudTopBar-2
    given: "shared=hudTopBar inside any parent"
    when: "tap btnBack"
    then: "navigation pops the current scene/popup"
    test_hint: "UI E2E"

  - id: U-hudTopBar-3
    given: "shared=hudTopBar, data.titleKey=\"i18n.gameplay.title\""
    when: "render"
    then: "lblTitle shows the resolved i18n string for that key"
    test_hint: "unit"

notes: |
  - This cluster has no FSM of its own — `modes` is `null`. Both buttons are
    state-independent so they live on widget-level `on:` directly.
  - Parents that need different left-button behavior (e.g. opening a confirm popup
    before navigating back) should NOT extend this — declare their own top bar
    inline. Keeping `nav.back()` fixed is the point of sharing.
  - Variants (e.g. `hudTopBarWithCoins` for a top bar that also shows currency)
    should be **separate shared blueprints**, not extensions of this one. Reuse via
    composition only.
